<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>اپلیکیشن پورمند</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#030712">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700;900&display=swap?v=105" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Vazirmatn', sans-serif; }
  body {
    background-color: #030712; color: #F3F4F6; padding: 16px 12px 60px; min-height: 100vh;
    background-image: radial-gradient(circle at 50% 0%, #0B1528 0%, #030712 75%);
  }
  .app-container { max-width: 480px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 16px; padding: 10px 0; }
  header h1 { font-size: 22px; color: #F59E0B; font-weight: 900; }
  header p { font-size: 11px; color: #6B7280; margin-top: 4px; }
  
  /* دکمه دانلود گروهی فوق العاده سریع */
  .bulk-download-banner {
    background: linear-gradient(135deg, #1E3A8A 0%, #0F172A 100%);
    border: 2px solid #3B82F6; border-radius: 16px; padding: 16px; margin-bottom: 20px;
    box-shadow: 0 8px 25px rgba(59, 130, 246, 0.25); text-align: center;
  }
  
  .card-panel {
    background: rgba(17, 24, 39, 0.95); border: 1px solid rgba(245, 158, 11, 0.2);
    border-radius: 20px; padding: 20px; margin-bottom: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }
  .panel-header { font-size: 14px; font-weight: 700; color: #F59E0B; padding-bottom: 10px; margin-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.08); display: flex; justify-content: space-between; align-items: center; }
  
  label { display: block; font-size: 12px; color: #D1D5DB; margin: 12px 0 6px; font-weight: 500; }
  input[type=text], select {
    width: 100%; padding: 13px; border-radius: 12px; border: 1px solid #1F2937;
    background: #0B1329; color: #FFF; font-size: 14px; direction: rtl; outline: none;
  }
  input:focus, select:focus { border-color: #F59E0B; box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.15); }
  
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  
  .pricing-tabs { display: flex; gap: 6px; margin: 6px 0; background: #030712; padding: 4px; border-radius: 12px; border: 1px solid #1F2937; }
  .tab-btn { flex: 1; padding: 10px; border-radius: 8px; font-size: 12.5px; border: none; background: transparent; color: #9CA3AF; cursor: pointer; font-weight: 500; }
  .tab-btn.active { background: #1F2937; color: #F59E0B; font-weight: 700; }
  
  .upload-trigger {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 13px; text-align: center; border-radius: 12px;
    border: 1px dashed rgba(245, 158, 11, 0.4); background: rgba(245, 158, 11, 0.02); color: #F59E0B; font-size: 13px; cursor: pointer; margin-top: 12px; font-weight: 600;
  }
  input[type=file] { display: none; }
  
  .canvas-container { margin-top: 16px; border-radius: 16px; overflow: hidden; border: 1px solid #1F2937; box-shadow: 0 15px 35px rgba(0,0,0,0.7); position: relative; }
  .canvas-container canvas { width: 100%; display: block; background: #030712; }
  
  .btn-action { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 13px 16px; font-size: 14px; font-weight: 700; border-radius: 12px; border: none; cursor: pointer; width: 100%; margin-top: 14px; font-family: inherit; }
  .btn-gold { background: linear-gradient(135deg, #F59E0B 0%, #D97706 100%); color: #030712; box-shadow: 0 4px 14px rgba(245,158,11,0.25); }
  .btn-blue-giant { background: linear-gradient(135deg, #3B82F6 0%, #2563EB 100%); color: #FFF; font-size: 15px; box-shadow: 0 6px 20px rgba(37,99,235,0.4); margin-top: 6px; }
  .btn-dark-add { background: #111827; color: #F59E0B; border: 1px solid rgba(245, 158, 11, 0.3); padding: 15px; margin-top: 8px; border-radius: 14px; font-size: 14px; }
  .btn-delete { background: rgba(239, 68, 68, 0.15); color: #EF4444; border: 1px solid rgba(239, 68, 68, 0.25); padding: 5px 10px; font-size: 11.5px; border-radius: 6px; font-weight: 500; }
  
  .contact-box { background: rgba(255,255,255,0.02); padding: 11px; border-radius: 12px; margin-top: 8px; border: 1px solid rgba(255,255,255,0.04); display: flex; gap: 8px; }
  .footer-credit { font-size: 11px; color: #4B5563; text-align: center; margin-top: 24px; padding-bottom: 20px; }
</style>
</head>
<body>

<div class="app-container">
  <header>
    <h1>مجموعه خودرویی پورمند</h1>
    <p>نسخه هوشمند فست‌استوری (دانلود انبوه) — v21</p>
  </header>

  <div class="bulk-download-banner">
    <span style="font-size: 13px; color: #93C5FD; display: block; margin-bottom: 8px; font-weight: 500;">اتوماسیون سریع پیج اینستاگرام</span>
    <button class="btn-action btn-blue-giant" onclick="downloadAllSlidesAtOnce()">🚀 دانلود یکجای تمام اسلایدهای امروز</button>
  </div>

  <div class="card-panel">
    <div class="panel-header"><span>۱. اسلاید کاور ورودی</span></div>
    <label>تاریخ دقیق امروز</label>
    <input type="text" id="coverDate" placeholder="مثلاً ۹ تیر ۱۴۰۵" oninput="renderCover()">
    <label>متن دوم روی کاور</label>
    <input type="text" id="coverSub" value="موجودی جدید امروز نمایشگاه" oninput="renderCover()">
    
    <div class="canvas-container"><canvas id="coverCanvas" width="1080" height="1080"></canvas></div>
    <button class="btn-action btn-gold" onclick="triggerSingleDownload('coverCanvas', '00-کاور-موجودی')">⬇ دانلود تکی اسلاید کاور</button>
  </div>

  <div class="card-panel">
    <div class="panel-header"><span>مدیریت کارشناسان فروش نمایشگاه</span></div>
    <div id="contacts-list"></div>
  </div>

  <div id="cars-wrapper">
    <div class="card-panel" id="car-panel-1">
      <div class="panel-header"><span>۲. اسلاید خودرو شماره ۱</span></div>
      
      <label>نام و برند خودرو</label>
      <input type="text" id="name-1" placeholder="مثلاً کیا اپتیما GT Line" oninput="syncCarData(1, 'name', this.value)">

      <div class="grid-3" style="margin-top:8px;">
        <div><label>مدل خودرو</label><input type="text" id="model-1" placeholder="۲۰۱۷" oninput="syncCarData(1, 'model', this.value)"></div>
        <div><label>رنگ بدنه</label><input type="text" id="color-1" placeholder="سفید صدفی" oninput="syncCarData(1, 'color', this.value)"></div>
        <div><label>وضعیت رنگ</label><input type="text" id="status-1" placeholder="دو لکه رنگ" oninput="syncCarData(1, 'status', this.value)"></div>
      </div>

      <label style="margin-top:12px;">نحوه درج قیمت اسلاید</label>
      <div class="pricing-tabs">
        <button class="tab-btn active" id="tab-num-1" onclick="setCarPriceStyle(1, 'manual')">قیمت مشخص عددی</button>
        <button class="tab-btn" id="tab-call-1" onclick="setCarPriceStyle(1, 'call')">تماس بگیرید / استعلام</button>
      </div>

      <div style="margin-top:8px;">
        <div id="box-num-1"><label>قیمت (تومان)</label><input type="text" id="price-1" placeholder="۳,۴۰۰,۰۰۰,۰۰۰" oninput="syncCarData(1, 'price', this.value)"></div>
        <div id="box-call-1" style="display:none;"><label>کارشناس پاسخگو</label><select id="select-contact-1" onchange="syncCarData(1, 'contactId', this.value)"></select></div>
      </div>

      <label>توضیحات تکمیلی (خط آخر)</label>
      <input type="text" id="desc-1" placeholder="فول شرکتی، سقف پانوراما، بسیار تمیز" oninput="syncCarData(1, 'desc', this.value)">

      <label class="upload-trigger" onclick="document.getElementById('file-1').click()">📁 انتخاب و بارگذاری عکس خودرو از گالری</label>
      <input type="file" accept="image/*" id="file-1" onchange="processCarImage(1, this)">

      <div class="canvas-container" onclick="document.getElementById('file-1').click()"><canvas id="canvas-1" width="1080" height="1080"></canvas></div>
      <button class="btn-action btn-gold" onclick="triggerSingleDownload('canvas-1', '01-خودرو-1')">⬇ دانلود تکی اسلاید خودرو ۱</button>
    </div>
  </div>

  <button class="btn-action btn-dark-add" onclick="createNewCarSlot()">✨ افزودن خودرو جدید به لیست موجودی</button>
  <div class="footer-credit">طراحی لوکس اختصاصی مجموعه خودرویی پورمند</div>
</div>

<script>
const CANVAS_SIZE = 1080;
const COLOR_GOLD = '#E5C173', COLOR_GOLD_DIM = '#B8964A', COLOR_TEXT_LIGHT = '#FFFFFF', COLOR_SLATE = '#94A3B8';

let totalCarsCreated = 1;
const carsDatabase = {
  1: { id: 1, name: '', model: '', color: '', status: '', price: '', desc: '', priceMode: 'manual', contactId: '', imgObject: null }
};

const salesTeam = [
  { id: 'p1', name: 'علی‌اصغر پورمند', phone: '۰۹۱۴۶۴۰۱۱۲۰' },
  { id: 'p2', name: 'علی‌اصغر پورمند', phone: '۰۹۱۰۴۰۴۴۴۹۲' },
  { id: 'p3', name: 'خانم انوشه', phone: '۰۹۱۴۸۵۰۵۰۷۵' },
  { id: 'p4', name: 'سعید پورمند', phone: '۰۹۱۴۶۲۳۹۵۲۴' }
];

function drawPerfectRoundedRect(ctx, x, y, w, h, r) {
  ctx.beginPath(); ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function applyLuxuryBackground(ctx) {
  const grad = ctx.createRadialGradient(CANVAS_SIZE/2, CANVAS_SIZE/3, 50, CANVAS_SIZE/2, CANVAS_SIZE/2, CANVAS_SIZE*0.75);
  grad.addColorStop(0, '#0F203D'); grad.addColorStop(0.6, '#060C16'); grad.addColorStop(1, '#03050A');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
  ctx.strokeStyle = 'rgba(229, 193, 115, 0.04)'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(CANVAS_SIZE/2, CANVAS_SIZE/2, 475, 0, Math.PI * 2); ctx.stroke();
}

function drawBrandFooterFixed(ctx) {
  ctx.save();
  const w = 920, h = 115, x = 540 - w/2, y = 925, radius = 24;
  ctx.shadowColor = 'rgba(0, 0, 0, 0.8)'; ctx.shadowBlur = 35; ctx.shadowOffsetY = 12;
  drawPerfectRoundedRect(ctx, x, y, w, h, radius); ctx.fillStyle = '#060B14'; ctx.fill();
  ctx.shadowColor = 'transparent'; ctx.lineWidth = 3.5; ctx.strokeStyle = COLOR_GOLD;
  drawPerfectRoundedRect(ctx, x, y, w, h, radius); ctx.stroke();
  ctx.fillStyle = COLOR_GOLD; ctx.font = '900 54px Vazirmatn, Tahoma'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.direction = 'rtl';
  ctx.fillText('مجموعه خودرویی پورمند', 540, y + h/2 + 3);
  ctx.restore();
}

function renderCover() {
  const canvas = document.getElementById('coverCanvas'); if(!canvas) return;
  const ctx = canvas.getContext('2d'); applyLuxuryBackground(ctx);
  ctx.save(); ctx.translate(540, 340);
  ctx.strokeStyle = COLOR_GOLD; ctx.lineWidth = 4; ctx.beginPath(); ctx.arc(0, 0, 165, 0, Math.PI*2); ctx.stroke();
  ctx.strokeStyle = COLOR_GOLD_DIM; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.arc(0, 0, 182, 0, Math.PI*2); ctx.stroke();
  ctx.fillStyle = COLOR_GOLD; ctx.textAlign = 'center'; ctx.direction = 'rtl';
  ctx.font = '900 76px Vazirmatn, Tahoma'; ctx.fillText('موجودی', 0, -15);
  ctx.font = '700 54px Vazirmatn, Tahoma'; ctx.fillText('امروز', 0, 65); ctx.restore();
  const dateStr = document.getElementById('coverDate').value || 'امروز';
  ctx.fillStyle = COLOR_TEXT_LIGHT; ctx.font = '700 54px Vazirmatn, Tahoma'; ctx.textAlign = 'center'; ctx.direction = 'rtl';
  ctx.fillText(dateStr, 540, 620);
  const subStr = document.getElementById('coverSub').value || 'موجودی امروز نمایشگاه';
  if(subStr) { ctx.fillStyle = COLOR_GOLD; ctx.font = '500 36px Vazirmatn, Tahoma'; ctx.fillText(subStr, 540, 685); }
  ctx.fillStyle = COLOR_SLATE; ctx.font = '400 32px Vazirmatn, Tahoma'; ctx.fillText('برای مشاهده مدل‌ها ورق بزنید ←', 540, 785);
  drawBrandFooterFixed(ctx);
}

function buildSelectOptions(chosenId) {
  let markup = '<option value="">انتخاب کارشناس فروش...</option>';
  salesTeam.forEach(t => { const active = (String(chosenId) === t.id) ? 'selected' : ''; markup += `<option value="${t.id}" ${active}>${t.name} (${t.phone})</option>`; });
  return markup;
}

function syncCarData(id, field, text) {
  if(carsDatabase[id]) { carsDatabase[id][field] = text; renderCarSlide(id); }
}

function renderCarSlide(id) {
  const canvas = document.getElementById('canvas-' + id); if(!canvas) return;
  const ctx = canvas.getContext('2d'); const data = carsDatabase[id];
  ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE); applyLuxuryBackground(ctx);

  const px = 60, py = 55, pw = 960, ph = 500, pr = 32;
  drawPerfectRoundedRect(ctx, px, py, pw, ph, pr); ctx.save(); ctx.clip();
  if(data && data.imgObject) {
    const ratio = Math.max(pw / data.imgObject.width, ph / data.imgObject.height);
    const w = data.imgObject.width * ratio, h = data.imgObject.height * ratio;
    ctx.drawImage(data.imgObject, px + (pw - w)/2, py + (ph - h)/2, w, h);
  } else {
    const g = ctx.createLinearGradient(px, py, px, py + ph); g.addColorStop(0, '#0F1A2E'); g.addColorStop(1, '#050A14');
    ctx.fillStyle = g; ctx.fillRect(px, py, pw, ph);
    ctx.strokeStyle = 'rgba(229, 193, 115, 0.15)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(px+pw, py+ph); ctx.moveTo(px+pw, py); ctx.lineTo(px, py+ph); ctx.stroke();
    ctx.fillStyle = COLOR_GOLD; ctx.font = '500 34px Vazirmatn'; ctx.textAlign = 'center'; ctx.fillText('📸 تصویر واقعی خودرو روی اسلاید', 540, py + ph/2 + 12);
  }
  ctx.restore(); ctx.strokeStyle = COLOR_GOLD; ctx.lineWidth = 4; drawPerfectRoundedRect(ctx, px, py, pw, ph, pr); ctx.stroke();

  ctx.direction = 'rtl'; ctx.textAlign = 'center';
  ctx.fillStyle = COLOR_TEXT_LIGHT; ctx.font = '900 58px Vazirmatn';
  ctx.fillText(data.name || 'نام خودروی انتخابی', 540, 610);

  let badges = [];
  if(data.model) badges.push("مدل " + data.model);
  if(data.color) badges.push("رنگ " + data.color);
  if(data.status) badges.push(data.status);
  const metaString = badges.join('  |  ');
  if(metaString) { ctx.fillStyle = COLOR_GOLD; ctx.font = '700 32px Vazirmatn'; ctx.fillText(metaString, 540, 670); }

  if(data.priceMode === 'call') {
    const agent = salesTeam.find(x => x.id === data.contactId);
    const pW = 840, pH = 115, pY = 715, pX = 540 - pW/2;
    drawPerfectRoundedRect(ctx, pX, pY, pW, pH, 22); ctx.fillStyle = COLOR_GOLD; ctx.fill();
    ctx.fillStyle = '#050911'; ctx.font = '900 35px Vazirmatn';
    ctx.fillText('جهت استعلام قیمت روز تماس بگیرید', 540, pY + 45);
    if(agent) { ctx.font = '700 31px Vazirmatn'; ctx.fillText(`${agent.name} : ${agent.phone}`, 540, pY + 86); }
  } else if(data.price) {
    const pW = 720, pH = 95, pY = 725, pX = 540 - pW/2;
    drawPerfectRoundedRect(ctx, pX, pY, pW, pH, 20); ctx.fillStyle = COLOR_GOLD; ctx.fill();
    ctx.fillStyle = '#050911'; ctx.font = '900 46px Vazirmatn';
    ctx.fillText(data.price + ' تومان', 540, pY + 63);
  }

  if(data.desc) { ctx.fillStyle = COLOR_SLATE; ctx.font = '500 30px Vazirmatn'; ctx.fillText(data.desc, 540, 875); }
  drawBrandFooterFixed(ctx);
}

function setCarPriceStyle(id, mode) {
  if(!carsDatabase[id]) return; carsDatabase[id].priceMode = mode;
  const btnNum = document.getElementById('tab-num-' + id), btnCall = document.getElementById('tab-call-' + id);
  const boxNum = document.getElementById('box-num-' + id), boxCall = document.getElementById('box-call-' + id);
  if(mode === 'manual') {
    if(btnNum) btnNum.classList.add('active'); if(btnCall) btnCall.classList.remove('active');
    if(boxNum) boxNum.style.display = 'block'; if(boxCall) boxCall.style.display = 'none';
  } else {
    if(btnCall) btnCall.classList.add('active'); if(btnNum) btnNum.classList.remove('active');
    if(boxCall) boxCall.style.display = 'block'; if(boxNum) boxNum.style.display = 'none';
  }
  renderCarSlide(id);
}

function createNewCarSlot() {
  totalCarsCreated++; const id = totalCarsCreated;
  carsDatabase[id] = { id: id, name: '', model: '', color: '', status: '', price: '', desc: '', priceMode: 'manual', contactId: '', imgObject: null };
  
  const container = document.getElementById('cars-wrapper');
  const panel = document.createElement('div'); panel.className = 'card-panel'; panel.id = 'car-panel-' + id;
  panel.innerHTML = `
    <div class="panel-header"><span>اسلاید خودرو شماره ${id}</span><button class="btn-action btn-delete" onclick="deleteCarSlot(${id})">حذف اسلاید</button></div>
    <label>نام و برند خودرو</label>
    <input type="text" id="name-${id}" placeholder="مثلاً دنا پلاس توربو" oninput="syncCarData(${id}, 'name', this.value)">
    <div class="grid-3" style="margin-top:8px;">
      <div><label>مدل</label><input type="text" id="model-${id}" oninput="syncCarData(${id}, 'model', this.value)"></div>
      <div><label>رنگ</label><input type="text" id="color-${id}" oninput="syncCarData(${id}, 'color', this.value)"></div>
      <div><label>وضعیت</label><input type="text" id="status-${id}" oninput="syncCarData(${id}, 'status', this.value)"></div>
    </div>
    <label style="margin-top:12px;">نحوه درج قیمت اسلاید</label>
    <div class="pricing-tabs">
      <button class="tab-btn active" id="tab-num-${id}" onclick="setCarPriceStyle(${id}, 'manual')">قیمت عددی</button>
      <button class="tab-btn" id="tab-call-${id}" onclick="setCarPriceStyle(${id}, 'call')">تماس بگیرید</button>
    </div>
    <div style="margin-top:8px;">
      <div id="box-num-${id}"><label>قیمت</label><input type="text" id="price-${id}" oninput="syncCarData(${id}, 'price', this.value)"></div>
      <div id="box-call-${id}" style="display:none;"><label>کارشناس پاسخگو</label><select id="select-contact-${id}" onchange="syncCarData(${id}, 'contactId', this.value)">${buildSelectOptions('')}</select></div>
    </div>
    <label>توضیحات تکمیلی</label>
    <input type="text" id="desc-${id}" oninput="syncCarData(${id}, 'desc', this.value)">
    <label class="upload-trigger" onclick="document.getElementById('file-${id}').click()">📁 انتخاب و بارگذاری عکس خودرو از گالری</label>
    <input type="file" accept="image/*" id="file-${id}" onchange="processCarImage(${id}, this)">
    <div class="canvas-container" onclick="document.getElementById('file-${id}').click()"><canvas id="canvas-${id}" width="1080" height="1080"></canvas></div>
    <button class="btn-action btn-gold" onclick="triggerSingleDownload('canvas-${id}', '0${id}-خودرو-${id}')">⬇ دانلود تکی اسلاید خودرو ${id}</button>
  `;
  container.appendChild(panel);
  renderCarSlide(id);
}

function deleteCarSlot(id) {
  const el = document.getElementById('car-panel-' + id); if(el) el.remove(); delete carsDatabase[id];
}

function processCarImage(id, input) {
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader(); reader.onload = function(e) {
    const img = new Image(); img.onload = function() { if(carsDatabase[id]) { carsDatabase[id].imgObject = img; renderCarSlide(id); } };
    img.src = e.target.result;
  }; reader.readAsDataURL(file);
}

// تابع جدید، فوق العاده امن و سریع برای دانلود تکی بدون باگ قفل شدن صفحه
function triggerSingleDownload(canvasId, filename) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  
  canvas.toBlob((blob) => {
    if (!blob) return;
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename + '.png';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }, 'image/png');
}

// 🚀 شاهکار اصلی: دانلود همزمان و یکجای تمام اسلایدها با یک کلیک
function downloadAllSlidesAtOnce() {
  // ۱. دانلود کاور اول
  triggerSingleDownload('coverCanvas', '00-کاور-موجودی');
  
  // ۲. دور زدن و دانلود تمام اسلایدهای خودروی موجود در دیتابیس به صورت خودکار
  Object.keys(carsDatabase).forEach((id) => {
    const canvasId = 'canvas-' + id;
    const filename = `0${id}-خودرو-${id}`;
    // ایجاد فاصله زمانی بسیار ناچیز ۵۰ میلی ثانیه‌ای جهت پردازش مرتب در اندروید/آیفون
    setTimeout(() => {
      triggerSingleDownload(canvasId, filename);
    }, id * 50);
  });
}

window.onload = function() {
  const contactWrap = document.getElementById('contacts-list');
  salesTeam.forEach(t => {
    const d = document.createElement('div'); d.className = 'contact-box';
    d.innerHTML = `<span style="color:#F59E0B; font-weight:700;">${t.name}</span> <span style="color:#9CA3AF; margin-right:auto; direction:ltr;">${t.phone}</span>`;
    contactWrap.appendChild(d);
  });
  
  const sel1 = document.getElementById('select-contact-1'); if(sel1) sel1.innerHTML = buildSelectOptions('');
  renderCover(); renderCarSlide(1);
};
</script>
