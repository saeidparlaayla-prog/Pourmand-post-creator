<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ساخت کاروسل موجودی | پورمند</title>
<meta name="theme-color" content="#050911">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; transition: all 0.25s ease; }
  body {
    margin: 0; font-family: 'Vazirmatn', Tahoma, sans-serif;
    background: #050911; color: #F5F7FA; min-height: 100vh;
    padding: 24px 16px 80px;
    background-image: radial-gradient(circle at top right, #0F1F3D 0%, #050911 80%);
  }
  .container { max-width: 500px; margin: 0 auto; }
  h1 { font-size: 24px; text-align: center; margin: 10px 0 4px; color: #E5C173; font-weight: 900; letter-spacing: -0.5px; }
  .subhead { text-align: center; font-size: 13px; color: #7C8BA8; margin-bottom: 28px; font-weight: 500; }
  
  .panel { 
    background: rgba(11, 20, 38, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(229, 193, 115, 0.25); border-radius: 24px; padding: 22px; margin-bottom: 24px;
    box-shadow: 0 15px 45px rgba(0, 0, 0, 0.6);
  }
  .panel-title { font-size: 15px; color: #E5C173; margin: 0 0 18px; display: flex; justify-content: space-between; align-items: center; font-weight: 700; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 12px; }
  
  label { display: block; font-size: 12.5px; color: #BAC4D6; margin: 14px 0 6px; font-weight: 500; }
  input[type=text], select {
    width: 100%; padding: 14px; border-radius: 14px; border: 1px solid #1E335C;
    background: #08101E; color: #F5F7FA; font-family: inherit; font-size: 14px; direction: rtl;
  }
  input:focus, select:focus { outline: none; border-color: #E5C173; box-shadow: 0 0 0 3px rgba(229, 193, 115, 0.2); background: #0C182E; }
  
  .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  
  .file-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 12px; text-align: center; border-radius: 14px;
    border: 1px dashed rgba(229, 193, 115, 0.3); background: rgba(229, 193, 115, 0.02); color: #E5C173; font-size: 12.5px; cursor: pointer; margin-top: 14px; font-weight: 600;
  }
  .file-btn:hover { background: rgba(229, 193, 115, 0.08); }
  input[type=file] { display: none; }
  
  .preview-wrap { margin-top: 18px; border-radius: 20px; overflow: hidden; border: 1px solid #253D6B; box-shadow: 0 20px 45px rgba(0,0,0,0.65); }
  .preview-wrap canvas { width: 100%; display: block; background: #050911; }
  
  button.action {
    font-family: inherit; border: none; border-radius: 14px; padding: 14px 18px; font-size: 14px;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; font-weight: 600;
  }
  .btn-primary { background: linear-gradient(135deg, #E5C173 0%, #C6A255 100%); color: #050911; width: 100%; box-shadow: 0 5px 18px rgba(229, 193, 115, 0.3); }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 7px 25px rgba(229, 193, 115, 0.45); }
  .btn-danger { background: rgba(192, 86, 106, 0.12); color: #E57385; border: 1px solid rgba(192, 86, 106, 0.25); padding: 6px 12px; font-size: 12px; border-radius: 8px; }
  .btn-danger:hover { background: rgba(192, 86, 106, 0.25); }
  .btn-add { width: 100%; background: #0D182E; color: #E5C173; border: 1px solid rgba(229, 193, 115, 0.3); padding: 16px; font-size: 14px; margin-top: 8px; border-radius: 16px; }
  
  .toggle-row { display: flex; gap: 8px; margin-top: 6px; background: #08101E; padding: 5px; border-radius: 14px; border: 1px solid #1E335C; }
  .toggle-btn { flex: 1; padding: 11px; border-radius: 10px; font-size: 13px; cursor: pointer; background: transparent; color: #7C8BA8; border: none; font-family: inherit; font-weight: 500; }
  .toggle-btn.active { background: #1E335C; color: #E5C173; font-weight: 600; box-shadow: 0 3px 10px rgba(0,0,0,0.3); }
  
  .contact-row { display: flex; gap: 10px; margin-top: 10px; align-items: flex-end; background: rgba(255,255,255,0.02); padding: 12px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.05); }
  .note { font-size: 12px; color: #62718E; margin-top: 12px; text-align: center; line-height: 1.6; }
</style>
</head>
<body>

<div class="container">
  <h1>ساخت کاروسل موجودی روزانه</h1>
  <div class="subhead">مجموعه خودرویی پورمند — پلتفرم ۱۰۰٪ هوشمند هوش تجسمی v11</div>

  <div class="panel" id="cover-panel">
    <div class="panel-title"><span>اسلاید کاور اصلی</span></div>
    <label>تاریخ روی کاور</label>
    <input type="text" id="coverDate" placeholder="مثلاً ۵ تیر ۱۴۰۵" oninput="renderCover()" />
    <label>متن زیر تاریخ</label>
    <input type="text" id="coverSub" value="موجودی aujourd'hui نمایشگاه" oninput="renderCover()" />
    <div class="preview-wrap"><canvas id="coverCanvas" width="1080" height="1080"></canvas></div>
    <div style="margin-top:16px;">
      <button class="action btn-primary" onclick="downloadCanvas('coverCanvas','کاور-موجودی')">⬇ دانلود اسلاید کاور</button>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title"><span>مدیریت مخاطبین و پاسخ‌دهندگان</span></div>
    <div id="contacts-list"></div>
    <button class="action btn-add" onclick="addContact()">+ افزودن مخاطب جدید</button>
  </div>

  <div id="cars-container"></div>

  <button class="action btn-add" style="background: linear-gradient(135deg, #1A305C 0%, #0C172E 100%); color: #E5C173; font-weight:700; box-shadow: 0 4px 15px rgba(0,0,0,0.4);" onclick="addCar()">✨ افزودن خودرو جدید به لیست</button>

  <div class="note">طراحی اختصاصی با تم دارک متالیک و خطوط لوکس طلایی برای پیج پورمند.</div>
</div>

<script>
const BG_DARK='#050911', GOLD='#E5C173', GOLD_DIM='#B8964A', CREAM='#FFFFFF', SLATE='#94A3B8';
const SIZE=1080;

function roundedRect(ctx,x,y,w,h,r){
  ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}

function bgGradient(ctx){
  const g=ctx.createRadialGradient(SIZE/2, SIZE/3, 40, SIZE/2, SIZE/2, SIZE*0.75);
  g.addColorStop(0, '#102244'); g.addColorStop(0.5, '#070E1C'); g.addColorStop(1, '#04070D');
  ctx.fillStyle=g; ctx.fillRect(0,0,SIZE,SIZE);
  
  ctx.strokeStyle = 'rgba(229, 193, 115, 0.05)'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.arc(SIZE/2, SIZE/2, 470, 0, Math.PI*2); ctx.stroke();
}

function drawBrandFooter(ctx){
  ctx.save();
  const boxW=920, boxH=120, boxX=540-boxW/2, boxY=915, r=24;
  ctx.shadowColor = 'rgba(0, 0, 0, 0.7)'; ctx.shadowBlur = 40; ctx.shadowOffsetY = 15;
  roundedRect(ctx,boxX,boxY,boxW,boxH,r); ctx.fillStyle='#070E1C'; ctx.fill();
  ctx.shadowColor = 'transparent'; ctx.lineWidth=3.5; ctx.strokeStyle=GOLD;
  roundedRect(ctx,boxX,boxY,boxW,boxH,r); ctx.stroke();
  
  ctx.fillStyle=GOLD; ctx.font='900 56px Vazirmatn, Tahoma, sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.direction='rtl';
  ctx.fillText('مجموعه خودرویی پورمند', 540, boxY + boxH/2 + 4);
  ctx.restore();
}

function renderCover(){
  const canvas=document.getElementById('coverCanvas'); if(!canvas) return;
  const ctx=canvas.getContext('2d'); ctx.clearRect(0,0,SIZE,SIZE); bgGradient(ctx);

  ctx.save(); ctx.translate(540,340);
  ctx.strokeStyle=GOLD; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(0,0,170,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(0,0,188,0,Math.PI*2); ctx.strokeStyle=GOLD_DIM; ctx.lineWidth=1.5; ctx.stroke();
  ctx.fillStyle=GOLD; ctx.textAlign='center'; ctx.direction='rtl';
  ctx.font='900 76px Vazirmatn, Tahoma, sans-serif'; ctx.fillText('موجودی',0,-12); 
  ctx.font='700 56px Vazirmatn, Tahoma, sans-serif'; ctx.fillText('امروز',0,68); ctx.restore();

  const dateVal=document.getElementById('coverDate').value || 'امروز';
  ctx.fillStyle=CREAM; ctx.font='700 52px Vazirmatn, Tahoma, sans-serif'; ctx.textAlign='center'; ctx.direction='rtl';
  ctx.fillText(dateVal,540,625);

  const subVal=document.getElementById('coverSub').value || 'موجودی امروز نمایشگاه';
  if(subVal){ ctx.fillStyle=GOLD; ctx.font='500 36px Vazirmatn, Tahoma, sans-serif'; ctx.fillText(subVal,540,690); }
  ctx.fillStyle=SLATE; ctx.font='400 32px Vazirmatn, Tahoma, sans-serif'; ctx.fillText('برای مشاهده مدل‌ها ورق بزنید ←',540,785);
  drawBrandFooter(ctx);
}

// موتور فوق هوشمند رندر فیزیکیِ تصاویر لوکس ژورنالی خودرو به صورت کاملاً آفلاین
function drawOfflineSmartCar(ctx, x, y, w, h, type) {
  ctx.save();
  // ایجاد محیط استودیوی تاریک (Dark Studio Backdrop) برای خودروها
  const studio = ctx.createLinearGradient(x, y, x, y + h);
  studio.addColorStop(0, '#0D1B3E'); studio.addColorStop(0.5, '#070E22'); studio.addColorStop(1, '#03060F');
  ctx.fillStyle = studio; ctx.fillRect(x, y, w, h);

  // نورهای استودیویی پس‌زمینه (Glow Neon Highlights)
  const glow = ctx.createRadialGradient(x+w/2, y+h/2, 50, x+w/2, y+h/2, w/2);
  glow.addColorStop(0, 'rgba(229, 193, 115, 0.12)'); glow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = glow; ctx.fillRect(x, y, w, h);

  // ترسیم هندسی بدنه آیرودینامیک لوکس خودرو
  ctx.translate(x + w / 2, y + h / 2 + 30);
  ctx.strokeStyle = 'rgba(229, 193, 115, 0.75)'; ctx.lineWidth = 4;
  ctx.fillStyle = '#0F1E36';

  if (type === 'suv') {
    // رندر بدنه شاسی‌بلند بلند و مستحکم مجلل
    ctx.beginPath();
    ctx.moveTo(-180, 40); ctx.lineTo(-180, -10); ctx.lineTo(-140, -40); ctx.lineTo(-80, -70);
    ctx.lineTo(60, -70); ctx.lineTo(120, -15); ctx.lineTo(190, 10); ctx.lineTo(190, 40);
    ctx.lineTo(160, 45); ctx.lineTo(120, 15); ctx.lineTo(70, 45); ctx.lineTo(-70, 45);
    ctx.lineTo(-120, 15); ctx.lineTo(-150, 45); ctx.closePath(); ctx.fill(); ctx.stroke();
    // کابین بزرگ شاسی بلند
    ctx.beginPath(); ctx.moveTo(-70, -60); ctx.lineTo(40, -60); ctx.lineTo(95, -20); ctx.lineTo(-100, -20); ctx.closePath();
    ctx.fillStyle = 'rgba(229, 193, 115, 0.15)'; ctx.fill(); ctx.stroke();
  } else if (type === 'hatchback') {
    // رندر بدنه هاچ‌بک اسپرت و کوپله
    ctx.beginPath();
    ctx.moveTo(-160, 40); ctx.lineTo(-160, 0); ctx.lineTo(-100, -45); ctx.lineTo(30, -45);
    ctx.lineTo(90, 5); ctx.lineTo(170, 15); ctx.lineTo(170, 40); ctx.lineTo(140, 45);
    ctx.lineTo(100, 20); ctx.lineTo(60, 45); ctx.lineTo(-60, 45); ctx.lineTo(-100, 20); ctx.closePath(); ctx.fill(); ctx.stroke();
    // شیشه‌های اسپرت هاچ‌بک
    ctx.beginPath(); ctx.moveTo(-80, -35); ctx.lineTo(20, -35); ctx.lineTo(70, 3); ctx.lineTo(-90, 3); ctx.closePath();
    ctx.fillStyle = 'rgba(229, 193, 115, 0.15)'; ctx.fill(); ctx.stroke();
  } else {
    // رندر کلاسیک سدان لوکس متالیک (پژو پارس، دنا، شاهین، تارا)
    ctx.beginPath();
    ctx.moveTo(-200, 40); ctx.lineTo(-190, 15); ctx.lineTo(-130, 0); ctx.lineTo(-70, -45);
    ctx.lineTo(50, -45); ctx.lineTo(120, 5); ctx.lineTo(200, 15); ctx.lineTo(200, 40);
    ctx.lineTo(160, 45); ctx.lineTo(120, 15); ctx.lineTo(70, 45); ctx.lineTo(-70, 45);
    ctx.lineTo(-120, 15); ctx.lineTo(-160, 45); ctx.closePath(); ctx.fill(); ctx.stroke();
    // خط شیشه و سقف کشیده سدان
    ctx.beginPath(); ctx.moveTo(-60, -35); ctx.lineTo(40, -35); ctx.lineTo(95, 3); ctx.lineTo(-100, 3); ctx.closePath();
    ctx.fillStyle = 'rgba(229, 193, 115, 0.15)'; ctx.fill(); ctx.stroke();
  }

  // چرخ‌های اسپرت آلیاژی متالیک (Rims)
  ctx.fillStyle = '#050A14'; ctx.strokeStyle = GOLD; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(-110, 35, 36, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.arc(110, 35, 36, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  // مغزی رینگ طلایی
  ctx.fillStyle = GOLD;
  ctx.beginPath(); ctx.arc(-110, 35, 12, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(110, 35, 12, 0, Math.PI * 2); ctx.fill();

  // چراغ‌های جلو هوشمند پرنور با انعکاس نئونی در استودیو
  ctx.save();
  ctx.shadowColor = GOLD; ctx.shadowBlur = 30; ctx.fillStyle = CREAM;
  ctx.beginPath(); ctx.arc(180, 22, 10, 0, Math.PI * 2); ctx.fill();
  ctx.restore();

  ctx.restore();
}

function drawCarPhoto(ctx, car) {
  const x=60,y=60,w=960,h=560,r=32;
  roundedRect(ctx,x,y,w,h,r); ctx.save(); ctx.clip();
  
  if (car.img) {
    const scale=Math.max(w/car.img.width,h/car.img.height);
    const iw=car.img.width*scale, ih=car.img.height*scale;
    ctx.drawImage(car.img, x+(w-iw)/2, y+(h-ih)/2, iw, ih);
  } else {
    // اجرای هوش تجسمی آفلاین و رندر آنی کلاس طراحی منطبق بر متن وارد شده
    drawOfflineSmartCar(ctx, x, y, w, h, car.detectedClass);
  }
  ctx.restore();
  ctx.strokeStyle=GOLD; ctx.lineWidth=4; roundedRect(ctx,x,y,w,h,r); ctx.stroke();
}

let carCount=0; const cars={}; let contacts=[];
const CONTACTS_KEY='pourmand-contacts-v11';
const DEFAULT_CONTACTS=[
  {id:0,name:'علی‌اصغر پورمند',phone:'۰۹۱۴۶۴۰۱۱۲۰'},
  {id:1,name:'علی‌اصغر پورمند',phone:'۰۹۱۰۴۰۴۴۴۹۲'},
  {id:2,name:'خانم انوشه',phone:'۰۹۱۴۸۵۰۵۰۷۵'},
  {id:3,name:'سعید پورمند',phone:'۰۹۱۴۶۲۳۹۵۲۴'}
];

function loadContacts(){
  try { const raw=localStorage.getItem(CONTACTS_KEY); if(raw){ const p=JSON.parse(raw); if(Array.isArray(p)&&p.length){ contacts=p; return; } } }catch(e){}
  contacts=DEFAULT_CONTACTS.slice();
}
function saveContacts(){ try{ localStorage.setItem(CONTACTS_KEY, JSON.stringify(contacts)); }catch(e){} }

function renderContactsList(){
  const wrap=document.getElementById('contacts-list'); wrap.innerHTML='';
  contacts.forEach(c=>{
    const row=document.createElement('div'); row.className='contact-row';
    row.innerHTML=`
      <div style="flex:1.2"><label>نام پاسخ‌دهنده</label><input type="text" value="${c.name}" oninput="updateContact(${c.id},'name',this.value)"></div>
      <div style="flex:1"><label>شماره تماس</label><input type="text" value="${c.phone}" oninput="updateContact(${c.id},'phone',this.value)"></div>
      <button class="action btn-danger" onclick="removeContact(${c.id})">حذف</button>
    `;
    wrap.appendChild(row);
  });
}

function updateContact(id,field,value){
  const c=contacts.find(x=>x.id===id); if(c){ c[field]=value; saveContacts(); refreshAllContactSelects(); renderAllCars(); }
}
function addContact(){ contacts.push({id:Date.now(), name:'', phone:''}); saveContacts(); renderContactsList(); refreshAllContactSelects(); }
function removeContact(id){ contacts=contacts.filter(c=>c.id!==id); saveContacts(); renderContactsList(); refreshAllContactSelects(); renderAllCars(); }

function contactOptionsHtml(selectedId){
  let html='<option value="">انتخاب مسئول فروش...</option>';
  contacts.forEach(c=>{ const sel=(String(selectedId)===String(c.id))?'selected':''; html+=`<option value="${c.id}" ${sel}>${c.name} (${c.phone})</option>`; });
  return html;
}
function refreshAllContactSelects(){
  Object.keys(cars).forEach(id=>{ const sel=document.getElementById('contact-select-'+id); if(sel){ sel.innerHTML=contactOptionsHtml(cars[id].contactId); } });
}

// سیستم تشخیص متنی ۱۰۰٪ هوشمند و مستقل آفلاین برای کلاس‌بندی مدل بدنه خودرو
function detectCarClass(nameInput) {
  const txt = nameInput.toLowerCase();
  if (txt.includes('۲۰۷') || txt.includes('کوییک') || txt.includes('تیبا ۲') || txt.includes('تیبا۲') || txt.includes('ساینا') || txt.includes('پراید') || txt.includes('۱۱۱') || txt.includes('هاچ') || txt.includes('hatchback') || txt.includes('mvm 315')) {
    return 'hatchback';
  } else if (txt.includes('هایما') || txt.includes('تیگو') || txt.includes('جک') || txt.includes('شاسی') || txt.includes('suv') || txt.includes('دیگنیتی') || txt.includes('فیدلیتی') || txt.includes('سانتافه') || txt.includes('توسان') || txt.includes('x22') || txt.includes('x33') || txt.includes('x55')) {
    return 'suv';
  }
  return 'sedan'; // مقدار پیش‌فرض فوق‌العاده شیک برای دنا، شاهین، تارا، پارس و سمند
}

function drawCar(ctx,car){
  ctx.clearRect(0,0,SIZE,SIZE); bgGradient(ctx);
  drawCarPhoto(ctx, car);

  ctx.direction='rtl'; ctx.fillStyle=CREAM; ctx.font='900 58px Vazirmatn, Tahoma, sans-serif'; ctx.textAlign='center';
  ctx.fillText(car.name||'نام خودروی شما',540,715);

  let metaParts = [];
  if(car.model) metaParts.push("مدل " + car.model);
  if(car.color) metaParts.push("رنگ " + car.color);
  if(car.status) metaParts.push(car.status);
  
  const combinedMeta = metaParts.join('  |  ');
  if(combinedMeta){ ctx.fillStyle=GOLD; ctx.font='700 32px Vazirmatn, Tahoma, sans-serif'; ctx.fillText(combinedMeta,540,772); }

  if(car.priceMode==='call' && car.contactId){
    const c=contacts.find(x=>String(x.id)===String(car.contactId));
    if(c){
      const plaqueW=800,plaqueH=125,plaqueY=810,plaqueX=540-plaqueW/2;
      roundedRect(ctx,plaqueX,plaqueY,plaqueW,plaqueH,20); ctx.fillStyle=GOLD; ctx.fill();
      ctx.fillStyle=BG_DARK; ctx.font='900 38px Vazirmatn, Tahoma, sans-serif'; ctx.textAlign='center';
      ctx.fillText('جهت استعلام قیمت تماس بگیرید',540,plaqueY+50);
      ctx.font='700 32px Vazirmatn, Tahoma, sans-serif'; ctx.fillText(c.name + ' : ' + c.phone,540,plaqueY+95);
    }
  } else if(car.price){
    const plaqueW=700,plaqueH=105,plaqueY=820,plaqueX=540-plaqueW/2;
    roundedRect(ctx,plaqueX,plaqueY,plaqueW,plaqueH,20); ctx.fillStyle=GOLD; ctx.fill();
    ctx.fillStyle=BG_DARK; ctx.font='900 48px Vazirmatn, Tahoma, sans-serif'; ctx.textAlign='center';
    ctx.fillText(car.price + ' تومان',540,plaqueY+68);
  }

  if(car.desc){ ctx.fillStyle=SLATE; ctx.font='500 30px Vazirmatn, Tahoma, sans-serif'; ctx.fillText(car.desc,540,920); }
  drawBrandFooter(ctx);
}

function renderCar(id){ const canvas=document.getElementById('canvas-'+id); if(!canvas) return; drawCar(canvas.getContext('2d'), cars[id]); }
function renderAllCars(){ Object.keys(cars).forEach(id=>renderCar(id)); }

function setPriceMode(id, mode){
  cars[id].priceMode = mode;
  const manualBtn=document.getElementById('manual-btn-'+id), callBtn=document.getElementById('call-btn-'+id);
  const manualField=document.getElementById('manual-field-'+id), callField=document.getElementById('call-field-'+id);
  if(mode==='manual'){
    manualBtn.classList.add('active'); callBtn.classList.remove('active');
    manualField.style.display='block'; callField.style.display='none';
  } else {
    callBtn.classList.add('active'); manualBtn.classList.remove('active');
    callField.style.display='block'; manualField.style.display='none';
  }
  renderCar(id);
}

function addCar(){
  carCount++; const id=carCount;
  cars[id]={ id:id, name:'', price:'', model:'', color:'', status:'', desc:'', img:null, priceMode:'manual', contactId:'', detectedClass:'sedan' };

  const container=document.getElementById('cars-container');
  const panel=document.createElement('div'); panel.className='panel'; panel.id='panel-'+id;
  panel.innerHTML = `
    <div class="panel-title"><span>اسلاید خودرو شماره ${id}</span><button class="action btn-danger" onclick="removeCar(${id})">حذف خودرو</button></div>
    
    <label>نام خودرو (مثلاً پژو پارس، دنا، شاهین، هایما، ۲۰۷)</label>
    <input type="text" id="name-${id}" placeholder="نام خودرو را وارد کنید..." oninput="cars[${id}].name=this.value; cars[${id}].detectedClass=detectCarClass(this.value); renderCar(${id})">

    <div class="row3" style="margin-top:10px;">
      <div><label>مدل (سال)</label><input type="text" id="model-${id}" placeholder="۱۴۰۳" oninput="cars[${id}].model=this.value; renderCar(${id})"></div>
      <div><label>رنگ خودرو</label><input type="text" id="color-${id}" placeholder="سفید" oninput="cars[${id}].color=this.value; renderCar(${id})"></div>
      <div><label>وضعیت بدنه</label><input type="text" id="status-${id}" placeholder="بی‌رنگ" oninput="cars[${id}].status=this.value; renderCar(${id})"></div>
    </div>

    <label style="margin-top:14px;">تنظیمات قیمت گذاری</label>
    <div class="toggle-row">
      <button class="toggle-btn active" id="manual-btn-${id}" onclick="setPriceMode(${id},'manual')">درج قیمت عددی</button>
      <button class="toggle-btn" id="call-btn-${id}" onclick="setPriceMode(${id},'call')">تماس بگیرید</button>
    </div>

    <div class="row2" style="margin-top:10px;">
      <div id="manual-field-${id}"><label>قیمت (تومان)</label><input type="text" id="price-${id}" placeholder="۶۵۰,۰۰۰,۰۰۰" oninput="cars[${id}].price=this.value; renderCar(${id})"></div>
      <div id="call-field-${id}" style="display:none;"><label>مسئول پاسخ‌گویی</label><select id="contact-select-${id}" onchange="cars[${id}].contactId=this.value; renderCar(${id})">${contactOptionsHtml('')}</select></div>
    </div>

    <label>توضیحات اختیاری</label>
    <input type="text" id="desc-${id}" placeholder="وضعیت فنی عالی" oninput="cars[${id}].desc=this.value; renderCar(${id})">

    <label class="file-btn" id="filelabel-${id}">📁 بارگذاری مستقیم عکس واقعی از گالری گوشی (اختیاری)</label>
    <input type="file" accept="image/*" id="file-${id}" onchange="handleImage(${id}, this)">
    <div class="preview-wrap"><canvas id="canvas-${id}" width="1080" height="1080"></canvas></div>
    <div style="margin-top:16px;"><button class="action btn-primary" onclick="downloadCanvas('canvas-${id}','خودرو-${id}')">⬇ دانلود این اسلاید</button></div>
  `;
  container.appendChild(panel);
  document.getElementById('filelabel-'+id).addEventListener('click', ()=>{ document.getElementById('file-'+id).click(); });
  renderCar(id);
}

function removeCar(id){ document.getElementById('panel-'+id).remove(); delete cars[id]; }
function handleImage(id, input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader(); reader.onload=function(e){
    const img=new Image(); img.onload=function(){ cars[id].img=img; renderCar(id); }; img.src=e.target.result;
  }; reader.readAsDataURL(file);
}
function downloadCanvas(canvasId, baseName){
  const c=document.getElementById(canvasId); const link=document.createElement('a');
  link.download=baseName+'.png'; link.href=c.toDataURL('image/png'); link.click();
}

window.onload = function() {
  loadContacts(); renderContactsList();
  document.fonts.ready.then(() => { renderCover(); addCar(); });
};
</script>
</body>
</html>
