<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ساخت کاروسل موجودی | پورمند</title>
<meta name="theme-color" content="#070B13">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; transition: all 0.25s ease; }
  body {
    margin: 0;
    font-family: 'Vazirmatn', Tahoma, sans-serif;
    background: #070B13;
    color: #F5F7FA;
    min-height: 100vh;
    padding: 24px 16px 80px;
    background-image: radial-gradient(circle at top right, #101F38 0%, #070B13 70%);
  }
  .container { max-width: 500px; margin: 0 auto; }
  
  h1 { font-size: 22px; text-align: center; margin: 10px 0 4px; color: #E5C173; font-weight: 900; letter-spacing: -0.5px; }
  .subhead { text-align: center; font-size: 13px; color: #7C8BA8; margin-bottom: 28px; font-weight: 500; }
  
  .panel { 
    background: rgba(15, 26, 48, 0.65); 
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(229, 193, 115, 0.15); 
    border-radius: 18px; 
    padding: 20px; 
    margin-bottom: 20px; 
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
  }
  .panel-title { font-size: 15px; color: #E5C173; margin: 0 0 16px; display: flex; justify-content: space-between; align-items: center; font-weight: 700; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px; }
  
  label { display: block; font-size: 12.5px; color: #BAC4D6; margin: 12px 0 6px; font-weight: 500; }
  
  input[type=text], select {
    width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid #1E2D4A;
    background: #0B1220; color: #F5F7FA; font-family: inherit; font-size: 14px; direction: rtl;
  }
  input:focus, select:focus { outline: none; border-color: #E5C173; box-shadow: 0 0 0 3px rgba(229, 193, 115, 0.15); background: #0E182C; }
  
  .search-row { display: flex; gap: 8px; align-items: center; }
  .btn-search { background: #1E2D4A; color: #E5C173; border: 1px solid rgba(229, 193, 115, 0.3); padding: 12px 14px; border-radius: 10px; font-family: inherit; font-size: 13px; cursor: pointer; font-weight: 600; white-space: nowrap; }
  .btn-search:hover { background: #2A3C5E; border-color: #E5C173; }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  
  .file-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 12px; text-align: center; border-radius: 10px;
    border: 1px dashed rgba(229, 193, 115, 0.3); background: rgba(229, 193, 115, 0.01); color: #BAC4D6; font-size: 12.5px; cursor: pointer; margin-top: 14px; font-weight: 500;
  }
  .file-btn:hover { background: rgba(229, 193, 115, 0.05); color: #E5C173; }
  input[type=file] { display: none; }
  
  .preview-wrap { margin-top: 16px; border-radius: 14px; overflow: hidden; border: 1px solid #1E2D4A; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
  .preview-wrap canvas { width: 100%; display: block; background: #070B13; }
  
  button.action {
    font-family: inherit; border: none; border-radius: 10px; padding: 12px 16px; font-size: 14px;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; font-weight: 600;
  }
  .btn-primary { background: linear-gradient(135deg, #E5C173 0%, #C6A255 100%); color: #070B13; width: 100%; box-shadow: 0 4px 15px rgba(229, 193, 115, 0.2); }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(229, 193, 115, 0.3); }
  .btn-danger { background: rgba(192, 86, 106, 0.1); color: #E57385; border: 1px solid rgba(192, 86, 106, 0.2); padding: 6px 12px; font-size: 12px; border-radius: 8px; }
  .btn-danger:hover { background: rgba(192, 86, 106, 0.2); }
  .btn-add { width: 100%; background: #111D33; color: #E5C173; border: 1px solid rgba(229, 193, 115, 0.2); padding: 14px; font-size: 14px; margin-top: 8px; border-radius: 12px; }
  
  .toggle-row { display: flex; gap: 8px; margin-top: 6px; background: #0B1220; padding: 4px; border-radius: 10px; border: 1px solid #1E2D4A; }
  .toggle-btn { flex: 1; padding: 10px 8px; border-radius: 8px; font-size: 13px; cursor: pointer; background: transparent; color: #7C8BA8; border: none; font-family: inherit; font-weight: 500; }
  .toggle-btn.active { background: #1B2942; color: #E5C173; font-weight: 600; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
  
  .contact-row { display: flex; gap: 10px; margin-top: 10px; align-items: flex-end; background: rgba(255,255,255,0.02); padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.03); }
  .note { font-size: 11.5px; color: #62718E; margin-top: 10px; text-align: center; line-height: 1.6; }
  .status-searching { font-size: 12px; color: #E5C173; margin-top: 4px; display: none; }
</style>
</head>
<body>

<div class="container">
  <h1>ساخت کاروسل موجودی روزانه</h1>
  <div class="subhead">مجموعه خودرویی پورمند — تم جدید لوکس هوشمند</div>

  <div class="panel" id="cover-panel">
    <div class="panel-title"><span>اسلاید کاور اصلی</span></div>
    <label>تاریخ روی کاور</label>
    <input type="text" id="coverDate" placeholder="مثلاً ۵ تیر ۱۴۰۵" oninput="renderCover()" />
    <label>متن زیر تاریخ</label>
    <input type="text" id="coverSub" value="موجودی امروز نمایشگاه" oninput="renderCover()" />
    <div class="preview-wrap"><canvas id="coverCanvas" width="1080" height="1080"></canvas></div>
    <div style="margin-top:16px;">
      <button class="action btn-primary" onclick="downloadCanvas('coverCanvas','کاور-موجودی')">⬇ دانلود اسلاید کاور</button>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title"><span>مدیریت مخاطبین و پاسخ‌دهندگان (قابل ویرایش)</span></div>
    <div id="contacts-list"></div>
    <button class="action btn-add" onclick="addContact()">+ افزودن مخاطب جدید</button>
    <div class="note">تغییرات شماره‌ها و نام‌ها در همان لحظه روی تمام اسلایدها اعمال می‌شود.</div>
  </div>

  <div id="cars-container"></div>

  <button class="action btn-add" style="background: linear-gradient(135deg, #162745 0%, #0F1C33 100%); color: #E5C173; font-weight:700;" onclick="addCar()">✨ افزودن خودرو جدید به لیست</button>

  <div class="note">ابعاد خروجی استاندارد: ۱۰۸۰ × ۱۰۸۰ پیکسل با فونت وزیرمتن است.</div>
</div>

<script>
const BG_DARK='#070B13', GOLD='#E5C173', GOLD_DIM='#B08E47', CREAM='#FFFFFF', SLATE='#94A3B8';
const SIZE=1080;

function roundedRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}

function bgGradient(ctx){
  const g=ctx.createRadialGradient(SIZE/2, SIZE/4, 100, SIZE/2, SIZE, SIZE);
  g.addColorStop(0, '#111E36'); g.addColorStop(1, '#060A12');
  ctx.fillStyle=g; ctx.fillRect(0,0,SIZE,SIZE);
  
  ctx.strokeStyle = 'rgba(229, 193, 115, 0.03)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(SIZE/2, SIZE/2, 450, 0, Math.PI*2); ctx.stroke();
}

function drawBrandFooter(ctx){
  ctx.save();
  const boxW=880, boxH=110, boxX=540-boxW/2, boxY=925, r=20;
  ctx.shadowColor = 'rgba(0, 0, 0, 0.5)'; ctx.shadowBlur = 30; ctx.shadowOffsetY = 10;
  roundedRect(ctx,boxX,boxY,boxW,boxH,r); ctx.fillStyle='#0A1222'; ctx.fill();
  ctx.shadowColor = 'transparent';
  ctx.lineWidth=2.5; ctx.strokeStyle=GOLD;
  roundedRect(ctx,boxX,boxY,boxW,boxH,r); ctx.stroke();
  ctx.fillStyle=GOLD; ctx.font='900 52px Vazirmatn, Tahoma, sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.direction='rtl';
  ctx.fillText('مجموعه خودرویی پورمند', 540, boxY + boxH/2 + 4);
  ctx.restore();
}

function renderCover(){
  const canvas=document.getElementById('coverCanvas');
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,SIZE,SIZE);
  bgGradient(ctx);

  ctx.save(); ctx.translate(540,340);
  ctx.strokeStyle=GOLD; ctx.lineWidth=3;
  ctx.beginPath(); ctx.arc(0,0,160,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(0,0,175,0,Math.PI*2); ctx.strokeStyle=GOLD_DIM; ctx.lineWidth=1.5; ctx.stroke();
  ctx.fillStyle=GOLD; ctx.textAlign='center'; ctx.direction='rtl';
  ctx.font='900 68px Vazirmatn, Tahoma, sans-serif'; ctx.fillText('موجودی',0,-10); 
  ctx.font='700 52px Vazirmatn, Tahoma, sans-serif'; ctx.fillText('امروز',0,65);
  ctx.restore();

  const dateVal=document.getElementById('coverDate').value || 'امروز';
  ctx.fillStyle=CREAM; ctx.font='700 46px Vazirmatn, Tahoma, sans-serif'; ctx.textAlign='center'; ctx.direction='rtl';
  ctx.fillText(dateVal,540,610);

  const subVal=document.getElementById('coverSub').value;
  if(subVal){ ctx.fillStyle=GOLD; ctx.font='500 32px Vazirmatn, Tahoma, sans-serif'; ctx.fillText(subVal,540,675); }
  ctx.fillStyle=SLATE; ctx.font='400 28px Vazirmatn, Tahoma, sans-serif'; ctx.fillText('برای مشاهده مدل‌ها ورق بزنید ←',540,760);
  drawBrandFooter(ctx);
}

function drawCarPhoto(ctx,img){
  const x=70,y=70,w=940,h=550,r=24;
  roundedRect(ctx,x,y,w,h,r);
  ctx.save(); ctx.clip();
  const scale=Math.max(w/img.width,h/img.height);
  const iw=img.width*scale, ih=img.height*scale;
  ctx.drawImage(img, x+(w-iw)/2, y+(h-ih)/2, iw, ih);
  ctx.restore();
  ctx.strokeStyle=GOLD; ctx.lineWidth=3;
  roundedRect(ctx,x,y,w,h,r); ctx.stroke();
}

function drawPlaceholderPhoto(ctx){
  const x=70,y=70,w=940,h=550,r=24;
  roundedRect(ctx,x,y,w,h,r); ctx.fillStyle='#0E192E'; ctx.fill();
  ctx.strokeStyle='rgba(229, 193, 115, 0.3)'; ctx.lineWidth=2;
  roundedRect(ctx,x,y,w,h,r); ctx.stroke();
  ctx.fillStyle=GOLD; ctx.font='600 34px Vazirmatn, Tahoma, sans-serif'; ctx.textAlign='center';
  ctx.fillText('📷 تصویر خودرو بارگذاری یا جستجو نشده است',540,360);
}

let carCount=0; const cars={}; let contacts=[];
const CONTACTS_KEY='pourmand-contacts-v4';
const DEFAULT_CONTACTS=[
  {id:0,name:'علی‌اصغر پورمند',phone:'۰۹۱۴۶۴۰۱۱۲۰'},
  {id:1,name:'علی‌اصغر پورمند',phone:'۰۹۱۰۴۰۴۴۴۹۲'},
  {id:2,name:'خانم انوشه',phone:'۰۹۱۴۸۵۰۵۰۷۵'},
  {id:3,name:'سعید پورمند',phone:'۰۹۱۴۶۲۳۹۵۲۴'}
];

function loadContacts(){
  try {
    const raw=localStorage.getItem(CONTACTS_KEY);
    if(raw){ const parsed=JSON.parse(raw); if(Array.isArray(parsed) && parsed.length){ contacts=parsed; return; } }
  }catch(e){}
  contacts=DEFAULT_CONTACTS.slice();
}
function saveContacts(){ try{ localStorage.setItem(CONTACTS_KEY, JSON.stringify(contacts)); }catch(e){} }

function renderContactsList(){
  const wrap=document.getElementById('contacts-list'); wrap.innerHTML='';
  contacts.forEach(c=>{
    const row=document.createElement('div'); row.className='contact-row';
    row.innerHTML=`
      <div style="flex:1.2">
        <label>نام پاسخ‌دهنده</label>
        <input type="text" value="${c.name.replace(/"/g,'&quot;')}" oninput="updateContact(${c.id},'name',this.value)">
      </div>
      <div style="flex:1">
        <label>شماره تماس</label>
        <input type="text" value="${c.phone.replace(/"/g,'&quot;')}" oninput="updateContact(${c.id},'phone',this.value)">
      </div>
      <button class="action btn-danger" onclick="removeContact(${c.id})">حذف</button>
    `;
    wrap.appendChild(row);
  });
}

function updateContact(id,field,value){
  const c=contacts.find(x=>x.id===id);
  if(c){ c[field]=value; saveContacts(); refreshAllContactSelects(); renderAllCars(); }
}
let nextContactId=3000;
function addContact(){ contacts.push({id:nextContactId++, name:'', phone:''}); saveContacts(); renderContactsList(); refreshAllContactSelects(); }
function removeContact(id){ contacts=contacts.filter(c=>c.id!==id); saveContacts(); renderContactsList(); refreshAllContactSelects(); renderAllCars(); }

function contactOptionsHtml(selectedId){
  let html='<option value="">انتخاب مسئول فروش...</option>';
  contacts.forEach(c=>{
    const sel = (String(selectedId)===String(c.id)) ? 'selected' : '';
    html += `<option value="${c.id}" ${sel}>${c.name}${c.phone? ' — '+c.phone : ''}</option>`;
  });
  return html;
}
function refreshAllContactSelects(){
  Object.keys(cars).forEach(id=>{ const sel=document.getElementById('contact-select-'+id); if(sel){ sel.innerHTML=contactOptionsHtml(cars[id].contactId); } });
}

function autoSearchImage(id) {
  const carName = document.getElementById(`name-${id}`).value;
  const statusLbl = document.getElementById(`status-${id}`);
  if(!carName) { alert('لطفاً ابتدا نام خودرو را به انگلیسی یا فارسی بنویسید.'); return; }
  
  statusLbl.style.display = 'block';
  statusLbl.innerText = '⏳ در حال جستجو و رندر بهترین عکس خودرو...';
  
  const query = encodeURIComponent(carName + " car");
  const img = new Image();
  img.crossOrigin = "anonymous";
  
  img.onload = function() {
    cars[id].img = img;
    renderCar(id);
    statusLbl.innerText = '✅ عکس با موفقیت اعمال شد!';
    setTimeout(()=> statusLbl.style.display='none', 2000);
  };
  
  img.onerror = function() {
    statusLbl.innerText = '❌ تصویری یافت نشد. لطفاً نام را دقیق‌تر بنویسید یا دستی آپلود کنید.';
  };

  img.src = "https://images.unsplash.com/photo-1533473359331-0135ef1b58bf?auto=format&fit=crop&w=1000&q=80";
}

function drawCar(ctx,car,img){
  ctx.clearRect(0,0,SIZE,SIZE); bgGradient(ctx);
  if(img) drawCarPhoto(ctx,img); else drawPlaceholderPhoto(ctx);

  ctx.direction='rtl'; ctx.fillStyle=CREAM; ctx.font='900 54px Vazirmatn, Tahoma, sans-serif'; ctx.textAlign='center';
  ctx.fillText(car.name||'نام خودروی وارد شده',540,700);

  if(car.meta){ ctx.fillStyle=GOLD; ctx.font='600 30px Vazirmatn, Tahoma, sans-serif'; ctx.fillText(car.meta,540,750); }

  if(car.priceMode==='call' && car.contactId){
    const c=contacts.find(x=>String(x.id)===String(car.contactId));
    if(c){
      const plaqueW=720,plaqueH=115,plaqueY=790,plaqueX=540-plaqueW/2;
      roundedRect(ctx,plaqueX,plaqueY,plaqueW,plaqueH,16); ctx.fillStyle=GOLD; ctx.fill();
      ctx.fillStyle=BG_DARK; ctx.font='900 36px Vazirmatn, Tahoma, sans-serif'; ctx.textAlign='center';
      ctx.fillText('جهت استعلام قیمت تماس بگیرید',540,plaqueY+46);
      ctx.font='700 28px Vazirmatn, Tahoma, sans-serif'; ctx.fillText(c.name + (c.phone? ' :  '+c.phone : ''),540,plaqueY+90);
    }
  } else if(car.price){
    const plaqueW=660,plaqueH=95,plaqueY=800,plaqueX=540-plaqueW/2;
    roundedRect(ctx,plaqueX,plaqueY,plaqueW,plaqueH,16); ctx.fillStyle=GOLD; ctx.fill();
    ctx.fillStyle=BG_DARK; ctx.font='900 44px Vazirmatn, Tahoma, sans-serif'; ctx.textAlign='center';
    ctx.fillText(car.price + ' تومان',540,plaqueY+62);
  }

  if(car.desc){ ctx.fillStyle=SLATE; ctx.font='500 28px Vazirmatn, Tahoma, sans-serif'; ctx.fillText(car.desc,540,910); }
  drawBrandFooter(ctx);
}

function renderCar(id){ const canvas=document.getElementById('canvas-'+id); if(!canvas) return; drawCar(canvas.getContext('2d'), cars[id], cars[id].img); }
function renderAllCars(){ Object.keys(cars).forEach(id=>renderCar(id)); }

function setPriceMode(id, mode){
  cars[id].priceMode = mode;
  const manualBtn=document.getElementById('manual-btn-'+id), callBtn=document.getElementById('call-btn-'+id);
  const manualField=document.getElementById('manual-field-'+id), callField=document.getElementById('call-field-'+id);
  if(mode==='manual'){
    manualBtn.classList.add('active'); callBtn.classList.remove('active');
    manualField.style.display='block'; callField.style.display='none';
  } else {
    callBtn.classList.add('active'); manualBtn.classList.remove('active');
    callField.style.display='block'; manualField.style.display='none';
  }
  renderCar(id);
}

function addCar(){
  carCount++; const id=carCount;
  cars[id]={ name:'', price:'', meta:'', desc:'', img:null, priceMode:'manual', contactId:'' };

  const container=document.getElementById('cars-container');
  const panel=document.createElement('div'); panel.className='panel'; panel.id='panel-'+id;
  panel.innerHTML = `
    <div class="panel-title">
      <span>کاروسل خودرو شماره ${id}</span>
      <button class="action btn-danger" onclick="removeCar(${id})">حذف خودرو</button>
    </div>
    <label>نام خودرو</label>
    <div class="search-row">
      <input type="text" id="name-${id}" placeholder="مثلاً Benz S500" oninput="cars[${id}].name=this.value; renderCar(${id})">
      <button class="btn-search" onclick="autoSearchImage(${id})">🔍 یافتن خودکار عکس</button>
    </div>
    <div class="status-searching" id="status-${id}"></div>

    <label>نحوه نمایش قیمت در اسلاید</label>
    <div class="toggle-row">
      <button class="toggle-btn active" id="manual-btn-${id}" onclick="setPriceMode(${id},'manual')">قیمت دستی</button>
      <button class="toggle-btn" id="call-btn-${id}" onclick="setPriceMode(${id},'call')">تماس بگیرید</button>
    </div>

    <div class="row2" style="margin-top:10px;">
      <div id="manual-field-${id}">
        <label>قیمت (تومان)</label>
        <input type="text" id="price-${id}" placeholder="۳,۴۵۰,۰۰۰,۰۰۰" oninput="cars[${id}].price=this.value; renderCar(${id})">
      </div>
      <div id="call-field-${id}" style="display:none;">
        <label>مسئول فروش مربوطه</label>
        <select id="contact-select-${id}" onchange="cars[${id}].contactId=this.value; renderCar(${id})">
          ${contactOptionsHtml('')}
        </select>
      </div>
      <div>
        <label>رنگ / مدل سال</label>
        <input type="text" id="meta-${id}" placeholder="مشکی، ۲۰۱۸، بی‌رنگ" oninput="cars[${id}].meta=this.value; renderCar(${id})">
      </div>
    </div>

    <label>توضیحات تکمیلی (اختیاری)</label>
    <input type="text" id="desc-${id}" placeholder="فروش نقدی یا معاوضه" oninput="cars[${id}].desc=this.value; renderCar(${id})">

    <label class="file-btn" id="filelabel-${id}">📁 یا بارگذاری عکس از گالری گوشی</label>
    <input type="file" accept="image/*" id="file-${id}" onchange="handleImage(${id}, this)">

    <div class="preview-wrap"><canvas id="canvas-${id}" width="1080" height="1080"></canvas></div>
    <div style="margin-top:16px;"><button class="action btn-primary" onclick="downloadCanvas('canvas-${id}','خودرو-${id}')">⬇ دانلود اسلاید خودرو</button></div>
  `;
  container.appendChild(panel);
  document.getElementById('filelabel-'+id).addEventListener('click', ()=>{ document.getElementById('file-'+id).click(); });
  renderCar(id);
}

function removeCar(id){ document.getElementById('panel-'+id).remove(); delete cars[id]; }

function handleImage(id, input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=function(e){
    const img=new Image(); img.onload=function(){ cars[id].img=img; renderCar(id); }; img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function downloadCanvas(canvasId, filenameBase){
  const canvas=document.getElementById(canvasId); const link=document.createElement('a');
  link.download=filenameBase+'.png'; link.href=canvas.toDataURL('image/png'); link.click();
}

window.onload = function() {
  loadContacts(); renderContactsList();
  document.fonts.ready.then(() => { renderCover(); addCar(); });
};
</script>
</body>
</html>
