<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ساخت کاروسل موجودی | پورمند</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; transition: all 0.2s ease; }
  body {
    margin: 0; font-family: 'Vazirmatn', Tahoma, sans-serif;
    background: #050911; color: #F5F7FA; min-height: 100vh;
    padding: 24px 16px 80px;
    background-image: radial-gradient(circle at top right, #0F1F3D 0%, #050911 80%);
  }
  .container { max-width: 500px; margin: 0 auto; }
  h1 { font-size: 24px; text-align: center; margin: 10px 0 4px; color: #E5C173; font-weight: 900; }
  .subhead { text-align: center; font-size: 13px; color: #7C8BA8; margin-bottom: 28px; }
  
  .panel { 
    background: rgba(11, 20, 38, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(229, 193, 115, 0.25); border-radius: 24px; padding: 22px; margin-bottom: 24px;
    box-shadow: 0 15px 45px rgba(0, 0, 0, 0.6);
  }
  .panel-title { font-size: 15px; color: #E5C173; margin: 0 0 18px; display: flex; justify-content: space-between; align-items: center; font-weight: 700; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 12px; }
  
  label { display: block; font-size: 12.5px; color: #BAC4D6; margin: 14px 0 6px; font-weight: 500; }
  input[type=text], select {
    width: 100%; padding: 14px; border-radius: 14px; border: 1px solid #1E335C;
    background: #08101E; color: #F5F7FA; font-family: inherit; font-size: 14px; direction: rtl;
  }
  input:focus, select:focus { outline: none; border-color: #E5C173; background: #0C182E; }
  
  .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  
  .file-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 14px; text-align: center; border-radius: 14px;
    border: 1px dashed rgba(229, 193, 115, 0.4); background: rgba(229, 193, 115, 0.03); color: #E5C173; font-size: 13px; cursor: pointer; margin-top: 14px; font-weight: 600;
  }
  input[type=file] { display: none; }
  
  .preview-wrap { margin-top: 18px; border-radius: 20px; overflow: hidden; border: 1px solid #253D6B; cursor: pointer; position: relative; }
  .preview-wrap canvas { width: 100%; display: block; background: #050911; }
  
  button.action {
    font-family: inherit; border: none; border-radius: 14px; padding: 14px 18px; font-size: 14px;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; font-weight: 600;
  }
  .btn-primary { background: linear-gradient(135deg, #E5C173 0%, #C6A255 100%); color: #050911; width: 100%; box-shadow: 0 5px 18px rgba(229, 193, 115, 0.3); }
  .btn-danger { background: rgba(192, 86, 106, 0.12); color: #E57385; border: 1px solid rgba(192, 86, 106, 0.25); padding: 6px 12px; font-size: 12px; border-radius: 8px; }
  .btn-add { width: 100%; background: #0D182E; color: #E5C173; border: 1px solid rgba(229, 193, 115, 0.3); padding: 16px; font-size: 14px; margin-top: 8px; border-radius: 16px; }
  
  .toggle-row { display: flex; gap: 8px; margin-top: 6px; background: #08101E; padding: 5px; border-radius: 14px; border: 1px solid #1E335C; }
  .toggle-btn { flex: 1; padding: 11px; border-radius: 10px; font-size: 13px; cursor: pointer; background: transparent; color: #7C8BA8; border: none; font-family: inherit; }
  .toggle-btn.active { background: #1E335C; color: #E5C173; font-weight: 600; }
  
  .contact-row { display: flex; gap: 10px; margin-top: 10px; align-items: flex-end; background: rgba(255,255,255,0.02); padding: 12px; border-radius: 14px; }
  .note { font-size: 12px; color: #62718E; margin-top: 12px; text-align: center; }
</style>
</head>
<body>

<div class="container">
  <h1>ساخت کاروسل موجودی روزانه</h1>
  <div class="subhead">مجموعه خودرویی پورمند — نسخه ۱۰۰٪ ثابت و تضمینی v17</div>

  <div class="panel" id="cover-panel">
    <div class="panel-title"><span>اسلاید کاور اصلی</span></div>
    <label>تاریخ روی کاور</label>
    <input type="text" id="coverDate" placeholder="مثلاً ۵ تیر ۱۴۰۵" oninput="renderCover()" />
    <label>متن زیر تاریخ</label>
    <input type="text" id="coverSub" value="موجودی امروز نمایشگاه" oninput="renderCover()" />
    <div class="preview-wrap"><canvas id="coverCanvas" width="1080" height="1080"></canvas></div>
    <div style="margin-top:16px;">
      <button class="action btn-primary" onclick="downloadCanvas('coverCanvas','کاور-موجودی')">⬇ دانلود اسلاید کاور</button>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title"><span>مدیریت مخاطبین و پاسخ‌دهندگان</span></div>
    <div id="contacts-list"></div>
    <button class="action btn-add" onclick="addContact()">+ افزودن مخاطب جدید</button>
  </div>

  <div id="cars-container">
    <div class="panel" id="panel-1">
      <div class="panel-title"><span>اسلاید خودرو شماره ۱</span></div>
      
      <label>نام خودرو</label>
      <input type="text" id="name-1" placeholder="مثلاً دنا پلاس توربو" oninput="updateCarData(1, 'name', this.value)">

      <div class="row3" style="margin-top:10px;">
        <div><label>مدل (سال)</label><input type="text" id="model-1" placeholder="۱۴۰۵" oninput="updateCarData(1, 'model', this.value)"></div>
        <div><label>رنگ خودرو</label><input type="text" id="color-1" placeholder="مشکی متالیک" oninput="updateCarData(1, 'color', this.value)"></div>
        <div><label>وضعیت بدنه</label><input type="text" id="status-1" placeholder="بی‌رنگ" oninput="updateCarData(1, 'status', this.value)"></div>
      </div>

      <label style="margin-top:14px;">تنظیمات قیمت گذاری</label>
      <div class="toggle-row">
        <button class="toggle-btn active" id="manual-btn-1" onclick="setPriceMode(1,'manual')">درج قیمت عددی</button>
        <button class="toggle-btn" id="call-btn-1" onclick="setPriceMode(1,'call')">تماس بگیرید</button>
      </div>

      <div class="row2" style="margin-top:10px;">
        <div id="manual-field-1"><label>قیمت (تومان)</label><input type="text" id="price-1" placeholder="۹۵۰,۰۰۰,۰۰۰" oninput="updateCarData(1, 'price', this.value)"></div>
        <div id="call-field-1" style="display:none;"><label>مسئول پاسخ‌گویی</label><select id="contact-select-1" onchange="updateCarData(1, 'contactId', this.value)"></select></div>
      </div>

      <label>توضیحات اختیاری</label>
      <input type="text" id="desc-1" placeholder="فول آپشن، تحویل روز" oninput="updateCarData(1, 'desc', this.value)">

      <label class="file-btn" onclick="document.getElementById('file-1').click()">📁 بارگذاری مستقیم عکس واقعی از گالری گوشی</label>
      <input type="file" accept="image/*" id="file-1" onchange="handleImage(1, this)">
      
      <div class="preview-wrap" onclick="document.getElementById('file-1').click()"><canvas id="canvas-1" width="1080" height="1080"></canvas></div>
      <div style="margin-top:16px;"><button class="action btn-primary" onclick="downloadCanvas('canvas-1','خودرو-1')">⬇ دانلود سریع این اسلاید</button></div>
    </div>
  </div>

  <button class="action btn-add" style="background: linear-gradient(135deg, #1A305C 0%, #0C172E 100%); color: #E5C173; font-weight:700;" onclick="addNewCarDynamic()">✨ افزودن خودرو جدید به لیست (ماشین‌های بعدی)</button>

  <div class="note">نسخه v17 — کادرهای اطلاعات خودرو کاملاً قفل و بدون خطای غیب شدن هستند.</div>
</div>
